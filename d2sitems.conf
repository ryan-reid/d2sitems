# d2sitems configuration file
# Uncomment and edit the lines below to override defaults.

# Directory containing game data files (armor.txt, weapons.txt, etc.)
# Default on Windows: C:\Program Files (x86)\Diablo II Resurrected\data\global\excel
excel_dir=C:\Program Files (x86)\Diablo II Resurrected\data\global\excel

# Directory containing Diablo II Resurrected save files (.d2s, .d2i)
# Default: ~/Saved Games/Diablo II Resurrected
#    ~ gets expanded to your home directory 
save_dir=~\Saved Games\Diablo II Resurrected

# Directory to hold inactive character files (mules)
# This is mule dir, not mule dear and not Mjölnir
mule_dir=~\Saved Games\Diablo II Resurrected\mules

# Filter by hardcore/softcore: hard, soft, or both (default: both)
core=both

# Filter by game version: Classic, Expansion, ReignOfTheWarlock, or all (default: all)
game_version=all

# Monitor mode poll interval in seconds (default: 5)
monitor_interval=1

# In monitor mode, regenerate all JSON files every N minutes (default: 10)
monitor_regen_minutes=10

# Monitor mode beep settings: comma-separated list of found,best,new or none (default: none)
# You can beep when "new" items are found that you do not have yet
# You can been when this item is the "best" out of all other copies you already have
# You can have "none" beeps
# beep=new,best
beep=none

# Similar settings for talking to you to tell you if your item is new, best or "none" to shut the hell up.
# beep=new,best
speak=none

# Comma-separated list of item names to exclude from JSON output (default: empty)
# Matches by the display name (base name or unique/set/runeword name).
exclude_items=Level 90 Reward,Game Modifiers,Blank Charm
